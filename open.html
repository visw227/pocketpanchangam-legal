<!DOCTYPE html>
<html lang="te">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pocket Panchangam · పాకెట్ పంచాంగం</title>
<meta name="description" content="తెలుగు పంచాంగం — తిథి, నక్షత్రం, రాహుకాలం, పండుగలు, రాశి ఫలాలు. ధర్మం వెనుక అసలైన అర్థం!">
<meta name="theme-color" content="#FAF6ED">
<link rel="icon" type="image/png" href="/icon.png">
<link rel="apple-touch-icon" href="/icon.png">
<meta property="og:type" content="website">
<meta property="og:site_name" content="Pocket Panchangam">
<meta property="og:title" content="Pocket Panchangam · పాకెట్ పంచాంగం">
<meta property="og:description" content="ధర్మం వెనుక అసలైన అర్థం! · Understanding the 'why' behind Dharma">
<meta property="og:image" content="https://pocketpanchangam.com/icon.png">
<meta property="og:url" content="https://pocketpanchangam.com/open.html">
<meta name="twitter:card" content="summary">
<style>
  :root{--bg:#FAF6ED;--surface:#FFFFFF;--ink:#26190F;--ink-soft:#6E5C4B;--ink-faint:#8F7F6B;
        --kumkuma:#9E2233;--kumkuma-deep:#7C1827;--pasupu:#B07D10;--line:#E8DFCC}
  *{box-sizing:border-box}
  [hidden]{display:none!important}
  body{margin:0;font-family:-apple-system,'Segoe UI',Roboto,'Noto Sans Telugu',sans-serif;
       background:var(--bg);color:var(--ink);min-height:100dvh;
       display:flex;flex-direction:column;align-items:center;justify-content:center;
       text-align:center;padding:32px 24px}
  main{width:100%;max-width:420px;display:flex;flex-direction:column;align-items:center}
  .appicon{width:84px;height:84px;border-radius:20px;border:1px solid var(--line);
           box-shadow:0 6px 24px rgba(38,25,15,.12);display:block}
  h1{font-size:14px;letter-spacing:3px;margin:16px 0 0;color:var(--pasupu);font-weight:800}
  .tagrow{display:flex;align-items:center;gap:10px;width:100%;margin:10px 0 26px}
  .tagrow::before,.tagrow::after{content:"";flex:1;height:1px;
       background:linear-gradient(90deg,transparent,var(--pasupu));opacity:.45}
  .tagrow::after{background:linear-gradient(90deg,var(--pasupu),transparent)}
  .tagline{font-family:Georgia,'Times New Roman',serif;font-style:italic;font-size:13.5px;
           color:var(--ink-soft);white-space:nowrap}
  .ctx{font-size:18px;line-height:1.5;font-weight:700;color:var(--ink);margin:0}
  a.btn{display:inline-block;margin-top:24px;padding:17px 48px;border-radius:999px;
        background:var(--kumkuma);color:#FFF6E8;font-weight:800;text-decoration:none;
        font-size:17.5px;min-height:44px;box-shadow:0 8px 22px rgba(158,34,51,.28);
        transition:transform .15s ease;animation:pulse 2.4s ease-in-out infinite}
  a.btn:active{transform:scale(.97);background:var(--kumkuma-deep)}
  a.btn:focus-visible{outline:3px solid var(--pasupu);outline-offset:3px}
  @keyframes pulse{0%,100%{box-shadow:0 8px 22px rgba(158,34,51,.28)}
                   50%{box-shadow:0 8px 30px rgba(158,34,51,.45)}}
  @media (prefers-reduced-motion:reduce){a.btn{animation:none}}
  p.note{color:var(--ink-soft);font-size:14.5px;line-height:1.65;max-width:330px;margin:16px 0 0}
  .badges{display:flex;gap:14px;align-items:center;justify-content:center;margin-top:26px;flex-wrap:wrap}
  .badges a{display:inline-flex;align-items:center;height:52px;overflow:hidden;border-radius:9px}
  .badges a:focus-visible{outline:3px solid var(--pasupu);outline-offset:2px}
  .badges img.as{height:52px}
  .badges img.gp{height:78px;margin:-13px 0}
  footer{margin-top:40px;width:100%;max-width:420px}
  .rule{height:1px;background:linear-gradient(90deg,transparent,var(--line),transparent);margin-bottom:14px}
  .made{font-size:12.5px;color:var(--ink-faint);margin:0}
  .dom{font-size:11px;letter-spacing:1.5px;color:var(--pasupu);font-weight:700;margin:6px 0 0}
</style>
</head>
<body>
<main>
  <img class="appicon" src="/icon.png" alt="Pocket Panchangam యాప్ ఐకాన్" width="84" height="84">
  <h1>POCKET PANCHANGAM</h1>
  <div class="tagrow"><span class="tagline">ధర్మం వెనుక అసలైన అర్థం!</span></div>
  <p class="ctx" id="ctx">మీ కోసం షేర్ చేశారు</p>
  <a class="btn" id="open" href="#">తెరవండి · Open</a>
  <p class="note" id="note">యాప్ ఉంటే నేరుగా తెరుచుకుంటుంది · లేకుంటే ఉచిత డౌన్‌లోడ్ పేజీ తెరుచుకుంటుంది<br>Opens the app if you have it — otherwise the free download.</p>
  <div class="badges" id="badges">
    <a id="badge-ios" href="https://apps.apple.com/app/id6787660096"><img class="as" alt="Download on the App Store" src="/badges/app-store.svg" width="156" height="52"></a>
    <a id="badge-android" href="https://play.google.com/store/apps/details?id=com.pocketpanchangam.app"><img class="gp" alt="Get it on Google Play" src="/badges/google-play.png" width="202" height="78"></a>
  </div>
  <footer>
    <div class="rule"></div>
    <p class="made">Lovingly built and curated by Keerthi &amp; Vamsi ❤️</p>
    <p class="dom">POCKETPANCHANGAM.COM</p>
  </footer>
</main>
<script>
(function(){
  // ?to=tab/panchangam or ?to=gita/2/47 → pocketpanchangam://<to>
  var raw = new URLSearchParams(location.search).get("to") || "tab/panchangam";
  var to = /^[a-zA-Z0-9/_.-]+$/.test(raw) ? raw : "tab/panchangam";
  var deep = "pocketpanchangam://" + to;
  var APPSTORE = "https://apps.apple.com/app/id6787660096";
  var PLAY = "https://play.google.com/store/apps/details?id=com.pocketpanchangam.app";

  // Tell the visitor WHAT was shared — a purposeful tap, not a mystery button.
  var m, label = "ఈరోజు పంచాంగం";
  if ((m = to.match(/^gita\/(\d+)\/(\d+)$/))) label = "భగవద్గీత శ్లోకం " + m[1] + "." + m[2];
  else if ((m = to.match(/^date\/(\d+)\/(\d+)\/(\d+)$/))) label = m[3] + "-" + m[2] + "-" + m[1] + " పంచాంగం";
  else if (/^tab\/calendar/.test(to)) label = "తెలుగు క్యాలెండర్";
  else if (/^tab\/festivals/.test(to)) label = "పండుగల జాబితా";
  else if (/^tab\/gita/.test(to)) label = "నేటి శ్లోకం";
  else if (/^rasi$/.test(to)) label = "రాశి ఫలాలు";
  else if (/^periods$/.test(to)) label = "కాలదర్శిని";
  else if (/^bhakti\//.test(to)) label = "సనాతన సందేశం";
  document.getElementById("ctx").textContent = "మీ కోసం షేర్ చేశారు: " + label;

  var ua = navigator.userAgent || "";
  var isAndroid = /Android/i.test(ua);
  // iPadOS 13+ masquerades as macOS — the touch check catches it.
  var isIOS = /iPhone|iPad|iPod/i.test(ua) ||
              (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);
  var open = document.getElementById("open");
  // Failed open → clear guidance instead of surprise redirects/prompts.
  function showInstall(storeUrl){
    document.getElementById("ctx").textContent = "యాప్ ఇంకా ఇన్‌స్టాల్ అవ్వలేదు · App not installed yet";
    open.textContent = "ఉచితంగా డౌన్‌లోడ్ చేయండి · Get the app";
    open.href = storeUrl;
    document.getElementById("note").textContent =
      "డౌన్‌లోడ్ అయ్యాక ఈ లింక్ మళ్ళీ నొక్కితే నేరుగా తెరుచుకుంటుంది · After installing, tap the shared link again and it opens directly.";
    document.getElementById("badge-ios").hidden = storeUrl.indexOf("apple") < 0;
    document.getElementById("badge-android").hidden = storeUrl.indexOf("apple") >= 0;
  }

  if (isAndroid) {
    // Android's native pattern: intent:// opens the app if installed and
    // falls back to the Play listing itself — no error dialog possible.
    open.href = "intent://" + to +
      "#Intent;scheme=pocketpanchangam;package=com.pocketpanchangam.app;" +
      "S.browser_fallback_url=" + encodeURIComponent(PLAY) + ";end";
    // Non-Chrome Android browsers ignore intent URLs — transform to the
    // download state instead of a surprise redirect (same UX as iOS).
    open.addEventListener("click", function(){
      var t = setTimeout(function(){
        if (document.visibilityState === "visible") showInstall(PLAY);
      }, 1800);
      window.addEventListener("pagehide", function(){ clearTimeout(t); }, { once: true });
    });
  } else if (isIOS) {
    // App installed → the scheme opens it and the page hides. App missing →
    // iOS unavoidably shows ONE "address is invalid" alert; auto-redirecting
    // afterwards fired Safari's SECOND "open in App Store?" prompt (real-user
    // report). So: no auto-redirect. After a failed attempt we TRANSFORM the
    // page into a clear download state — one obvious button, tapped by the
    // user, opens the App Store with no extra prompts. Universal Links
    // (1.3.3 binary) let installed users skip this page entirely.
    open.href = deep;
    open.addEventListener("click", function(){
      var t = setTimeout(function(){
        if (document.visibilityState !== "visible") return; // app took over
        showInstall(APPSTORE);
      }, 1800);
      window.addEventListener("pagehide", function(){ clearTimeout(t); }, { once: true });
    });
  } else {
    // Desktop / unknown: nothing to open here — point to the phone stores.
    open.hidden = true;
    document.getElementById("note").innerHTML =
      "ఫోన్‌లో ఉచితంగా డౌన్‌లోడ్ చేయండి · Get PocketPanchangam free on your phone";
  }
})();
</script>
</body>
</html>
